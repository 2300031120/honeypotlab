# Hardened Docker Compose Configuration
# Full Security Hardening Applied
# Usage: docker-compose -f docker-compose.hardened.yml up -d

services:
  # ==================== DATA TIER ====================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    # SECURITY: Network Segmentation - Database isolated in data-tier
    networks:
      - data-tier
    # SECURITY: Resource Limits - Prevent DoS
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    # SECURITY: Container Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
      - DAC_OVERRIDE
      - FOWNER
    # Note: read_only not set for postgres - needs to write to data volume
    # Note: user not set - postgres image runs as postgres (999) internally
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/run/postgresql:noexec,nosuid,size=10m
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cybersentinel}
      - POSTGRES_USER=${POSTGRES_USER:-cybersentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeThisLocalDbPassword_2026!}  # ⚠️ CRITICAL: MUST change in production! Use strong password with min 16 chars, mixed case, numbers, symbols
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cybersentinel} -d ${POSTGRES_DB:-cybersentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # ==================== APP TIER ====================
  terminal-sandbox:
    build: ./terminal-sandbox
    restart: unless-stopped
    expose:
      - "5100"
    # SECURITY: Network Segmentation - Sandbox in app-tier
    networks:
      - app-tier
    # SECURITY: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # SECURITY: Container Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Note: read_only not set - sandbox needs to write to /sandbox-data volume
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    environment:
      - SANDBOX_BASE_DIR=/sandbox-data
      - SANDBOX_EXEC_TIMEOUT_SEC=${TERMINAL_EXEC_TIMEOUT_SEC:-8}
      - SANDBOX_MAX_OUTPUT_CHARS=${TERMINAL_MAX_OUTPUT_CHARS:-12000}
      - SANDBOX_SESSION_TTL_SECONDS=${TERMINAL_SANDBOX_SESSION_TTL_SECONDS:-7200}
    volumes:
      - terminal_sandbox_data:/sandbox-data

  # ==================== HONEYPOT TIER ====================
  cowrie:
    image: cowrie/cowrie:latest
    profiles:
      - cowrie
    restart: unless-stopped
    # SECURITY: Network Segmentation - Cowrie in honeypot tier
    networks:
      - honeypot-tier
    # SECURITY: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    ports:
      - "${COWRIE_SSH_PORT:-2223}:2222"
    environment:
      - COWRIE_TELNET_ENABLED=${COWRIE_TELNET_ENABLED:-no}
      - COWRIE_OUTPUT_JSONLOG_ENABLED=${COWRIE_OUTPUT_JSONLOG_ENABLED:-yes}
    volumes:
      - cowrie_var_data:/cowrie/cowrie-git/var

  cowrie-bridge:
    build: ./cowrie-bridge
    profiles:
      - cowrie
    restart: unless-stopped
    # SECURITY: Network Segmentation - Bridge connects honeypot and app tiers
    networks:
      - honeypot-tier
      - app-tier
    # SECURITY: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    depends_on:
      - backend
      - cowrie
    environment:
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:5000}
      - PROTOCOL_SHARED_SECRET=${PROTOCOL_SHARED_SECRET:-dev-protocol-shared-secret-change-me}  # ⚠️ CRITICAL: MUST change in production! Use random 32+ char secret
      - COWRIE_SITE_ID=${COWRIE_SITE_ID:-}
      - COWRIE_JSON_LOG=${COWRIE_JSON_LOG:-/cowrie/cowrie-git/var/log/cowrie/cowrie.json}
      - COWRIE_HTTP_TIMEOUT_SEC=${COWRIE_HTTP_TIMEOUT_SEC:-4}
      - COWRIE_BRIDGE_POLL_INTERVAL_SEC=${COWRIE_BRIDGE_POLL_INTERVAL_SEC:-2}
    volumes:
      - cowrie_var_data:/cowrie/cowrie-git/var:ro
      - cowrie_bridge_data:/data

  ssh-decoy:
    build: ./ssh-decoy
    restart: unless-stopped
    # SECURITY: Network Segmentation - Honeypot isolated
    networks:
      - honeypot-tier
      - app-tier
    # SECURITY: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M
        reservations:
          cpus: '0.1'
          memory: 32M
    # SECURITY: Container Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    # Note: read_only not set - ssh-decoy needs to write to /data volume
    depends_on:
      - backend
      - terminal-sandbox
    ports:
      - "${SSH_DECOY_PORT:-2222}:2222"
    expose:
      - "5101"
    environment:
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:5000}
      - TERMINAL_SANDBOX_URL=${TERMINAL_SANDBOX_URL:-http://terminal-sandbox:5100}
      - PROTOCOL_SHARED_SECRET=${PROTOCOL_SHARED_SECRET:-dev-protocol-shared-secret-change-me}  # ⚠️ CRITICAL: MUST change in production! Use random 32+ char secret
      - PROTOCOL_SSH_AUTH_TRAP_ENABLED=${PROTOCOL_SSH_AUTH_TRAP_ENABLED:-true}
      - PROTOCOL_SSH_TRAP_CREDENTIALS=${PROTOCOL_SSH_TRAP_CREDENTIALS:-admin:Winter2026!,deploy:Deploy@2026!,reporting:Report#2026}  # ⚠️ CRITICAL: Change to realistic credentials in production
      - SSH_DECOY_LISTEN_HOST=0.0.0.0
      - SSH_DECOY_PORT=2222
      - SSH_DECOY_SITE_ID=${SSH_DECOY_SITE_ID:-}
      - SSH_DECOY_ACCEPT_ANY_PASSWORD=${SSH_DECOY_ACCEPT_ANY_PASSWORD:-false}
      - SSH_DECOY_SERVER_VERSION=${SSH_DECOY_SERVER_VERSION:-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6}
      - SSH_DECOY_HTTP_TIMEOUT_SEC=${SSH_DECOY_HTTP_TIMEOUT_SEC:-4}
    volumes:
      - ssh_decoy_data:/data

  # ==================== BACKEND (APP + DATA TIER) ====================
  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "5000"
    # SECURITY: Network Segmentation - Backend bridges app and data tiers
    networks:
      - app-tier
      - data-tier
    # SECURITY: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # SECURITY: Container Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - DAC_OVERRIDE
    # Note: read_only not set - backend needs to write to /data volume
    # Note: user not set - backend Dockerfile sets up its own user
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    depends_on:
      postgres:
        condition: service_healthy
      terminal-sandbox:
        condition: service_started
    environment:
      - APP_ENV=${APP_ENV:-development}
      - DATABASE_URL=${DATABASE_URL:-postgresql://cybersentinel:ChangeThisLocalDbPassword_2026!@postgres:5432/cybersentinel}
      - POSTGRES_DB=${POSTGRES_DB:-cybersentinel}
      - POSTGRES_USER=${POSTGRES_USER:-cybersentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeThisLocalDbPassword_2026!}  # ⚠️ CRITICAL: MUST change in production! Use strong password with min 16 chars, mixed case, numbers, symbols
      - PUBLIC_BASE_URL=${PUBLIC_BASE_URL:-http://localhost}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-}
      - FORCE_HTTPS_REDIRECT=${FORCE_HTTPS_REDIRECT:-false}
      - SECURITY_HEADERS_ENABLED=${SECURITY_HEADERS_ENABLED:-true}
      - SECURITY_HSTS_SECONDS=${SECURITY_HSTS_SECONDS:-31536000}
      - SECURITY_CONTENT_SECURITY_POLICY=${SECURITY_CONTENT_SECURITY_POLICY:-}
      - DECOY_COOKIE_SECURE=${DECOY_COOKIE_SECURE:-false}
      - DECOY_COOKIE_SAMESITE=${DECOY_COOKIE_SAMESITE:-lax}
      - AUTH_RATE_LIMIT_WINDOW_SECONDS=${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      - AUTH_RATE_LIMIT_MAX_ATTEMPTS=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-8}
      - LEAD_RATE_LIMIT_WINDOW_SECONDS=${LEAD_RATE_LIMIT_WINDOW_SECONDS:-300}
      - LEAD_RATE_LIMIT_MAX_ATTEMPTS=${LEAD_RATE_LIMIT_MAX_ATTEMPTS:-5}
      - LEAD_NOTIFICATION_WEBHOOK_URL=${LEAD_NOTIFICATION_WEBHOOK_URL:-}
      - LEAD_NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS=${LEAD_NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS:-5}
      - LEAD_NOTIFICATION_EMAIL_TO=${LEAD_NOTIFICATION_EMAIL_TO:-}
      - LEAD_NOTIFICATION_BRAND_NAME=${LEAD_NOTIFICATION_BRAND_NAME:-CyberSentil}
      - LEAD_NOTIFICATION_CONTACT_EMAIL=${LEAD_NOTIFICATION_CONTACT_EMAIL:-}
      - LEAD_AUTOREPLY_ENABLED=${LEAD_AUTOREPLY_ENABLED:-false}
      - LEAD_AUTOREPLY_REPLY_TO=${LEAD_AUTOREPLY_REPLY_TO:-}
      - LEAD_AUTOREPLY_DEMO_BOOKING_URL=${LEAD_AUTOREPLY_DEMO_BOOKING_URL:-}
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-CyberSentil}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - OLLAMA_REQUEST_TIMEOUT_SECONDS=${OLLAMA_REQUEST_TIMEOUT_SECONDS:-45}
      - AI_GENERATION_TIMEOUT_SECONDS=${AI_GENERATION_TIMEOUT_SECONDS:-25}
      - AI_BREAKER_FAILURE_THRESHOLD=${AI_BREAKER_FAILURE_THRESHOLD:-1}
      - AI_BREAKER_COOLDOWN_SECONDS=${AI_BREAKER_COOLDOWN_SECONDS:-60}
      - THREAT_ANALYSIS_AI_TIMEOUT_SECONDS=${THREAT_ANALYSIS_AI_TIMEOUT_SECONDS:-8}
      - SHELL_RESPONSE_AI_TIMEOUT_SECONDS=${SHELL_RESPONSE_AI_TIMEOUT_SECONDS:-8}
      - TERMINAL_REAL_EXEC_ENABLED=${TERMINAL_REAL_EXEC_ENABLED:-false}
      - TERMINAL_SANDBOX_URL=${TERMINAL_SANDBOX_URL:-http://terminal-sandbox:5100}
      - TERMINAL_EXEC_TIMEOUT_SEC=${TERMINAL_EXEC_TIMEOUT_SEC:-8}
      - TERMINAL_MAX_OUTPUT_CHARS=${TERMINAL_MAX_OUTPUT_CHARS:-12000}
      - PROTOCOL_SHARED_SECRET=${PROTOCOL_SHARED_SECRET:-dev-protocol-shared-secret}  # ⚠️ CRITICAL: MUST change in production! Use random 32+ char secret
      - SSH_DECOY_HEALTH_URL=${SSH_DECOY_HEALTH_URL:-http://ssh-decoy:5101/health}
      - SECRET_KEY=${SECRET_KEY:-dev-secret-key-change-me-at-least-32b}  # ⚠️ CRITICAL: MUST change in production! Use random 32+ char key
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - BOOTSTRAP_ADMIN_USERNAME=${BOOTSTRAP_ADMIN_USERNAME:-admin}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@cybersentil.local}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD:-ChangeThisAdminPassword_2026!}  # ⚠️ CRITICAL: MUST change in production! Use strong password with min 16 chars, mixed case, numbers, symbols
      - ENABLE_DEMO_SEED=${ENABLE_DEMO_SEED:-true}
      - ALLOW_SIGNUP=${ALLOW_SIGNUP:-false}
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL:-}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-}
      - SPLUNK_HEC_VERIFY_TLS=${SPLUNK_HEC_VERIFY_TLS:-true}
      - SPLUNK_HEC_TIMEOUT_SECONDS=${SPLUNK_HEC_TIMEOUT_SECONDS:-4}
      - PROTOCOL_SSH_AUTH_TRAP_ENABLED=${PROTOCOL_SSH_AUTH_TRAP_ENABLED:-true}
      - PROTOCOL_SSH_TRAP_CREDENTIALS=${PROTOCOL_SSH_TRAP_CREDENTIALS:-}
      - PROTOCOL_MYSQL_AUTH_TRAP_ENABLED=${PROTOCOL_MYSQL_AUTH_TRAP_ENABLED:-true}
      - PROTOCOL_MYSQL_TRAP_CREDENTIALS=${PROTOCOL_MYSQL_TRAP_CREDENTIALS:-}
    volumes:
      - backend_data:/data

  # ==================== DMZ TIER ====================
  frontend:
    build:
      context: ./frontend
      args:
        VITE_PUBLIC_SITE_NAME: ${VITE_PUBLIC_SITE_NAME:-CyberSentil}
        VITE_PUBLIC_SHORT_NAME: ${VITE_PUBLIC_SHORT_NAME:-CyberSentil}
        VITE_PUBLIC_BRAND_TEXT: ${VITE_PUBLIC_BRAND_TEXT:-CYBERSENTIL}
        VITE_PUBLIC_TAGLINE: ${VITE_PUBLIC_TAGLINE:-Deception-led threat detection}
        VITE_PUBLIC_SITE_DESCRIPTION: ${VITE_PUBLIC_SITE_DESCRIPTION:-Deception-led threat detection platform for earlier attacker visibility, preserved evidence, and AI-assisted incident context.}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-http://localhost}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-http://localhost}
        VITE_PUBLIC_LOGIN_URL: ${VITE_PUBLIC_LOGIN_URL:-}
        VITE_PUBLIC_COMPANY_NAME: ${VITE_PUBLIC_COMPANY_NAME:-CyberSentil}
        VITE_PUBLIC_CONTACT_EMAIL: ${VITE_PUBLIC_CONTACT_EMAIL:-contact@cybersentil.online}
        VITE_PUBLIC_SECURITY_EMAIL: ${VITE_PUBLIC_SECURITY_EMAIL:-security@cybersentil.online}
        VITE_PUBLIC_PRIVACY_EMAIL: ${VITE_PUBLIC_PRIVACY_EMAIL:-privacy@cybersentil.online}
        VITE_PUBLIC_DEMO_BOOKING_URL: ${VITE_PUBLIC_DEMO_BOOKING_URL:-}
        VITE_PUBLIC_DEMO_BOOKING_LABEL: ${VITE_PUBLIC_DEMO_BOOKING_LABEL:-Book Live Slot}
        VITE_PUBLIC_SHOW_STATUS_PILL: ${VITE_PUBLIC_SHOW_STATUS_PILL:-false}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    restart: unless-stopped
    # SECURITY: Network Segmentation - Frontend in DMZ
    networks:
      - dmz-tier
      - app-tier
    # SECURITY: Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # SECURITY: Container Hardening
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
      - CHOWN
      - DAC_OVERRIDE
    # Note: read_only removed - nginx needs to write to cache directories
    # read_only: true
    # Note: user not set - nginx image runs as nginx user internally
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/cache/nginx:noexec,nosuid,size=20m
      - /var/run:noexec,nosuid,size=5m
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    depends_on:
      - backend

  # ==================== CLOUDFLARE TUNNEL ====================
  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflare
    restart: unless-stopped
    networks:
      - dmz-tier
    depends_on:
      - frontend
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN:-}

  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    profiles:
      - quick-tunnel
    restart: unless-stopped
    networks:
      - dmz-tier
    depends_on:
      - frontend
    command: tunnel --no-autoupdate --url http://frontend:80

# ==================== NETWORK SEGMENTATION ====================
networks:
  # DMZ Tier - Public facing services (Internet accessible)
  dmz-tier:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.1.0/24
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"

  # App Tier - Application logic (Internal only)
  app-tier:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.2.0/24

  # Data Tier - Databases (Most restricted)
  data-tier:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.3.0/24

  # Honeypot Tier - Deception services (Monitored)
  honeypot-tier:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.4.0/24

volumes:
  postgres_data:
  backend_data:
  terminal_sandbox_data:
  ssh_decoy_data:
  cowrie_var_data:
  cowrie_bridge_data:
