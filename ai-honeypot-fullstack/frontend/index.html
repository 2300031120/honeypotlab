  <script>
    // Remove stale PWA/service-worker caches before app scripts run.
    (() => {
      if (typeof window === "undefined" || typeof navigator === "undefined") {
        return;
      }

      const cleanupKey = "public_site_sw_cleanup_done_v2";
      let alreadyReloaded = false;
      try {
        alreadyReloaded = window.sessionStorage?.getItem(cleanupKey) === "1";
      } catch {
        alreadyReloaded = false;
      }

      const markReloaded = () => {
        try {
          window.sessionStorage?.setItem(cleanupKey, "1");
        } catch {
          // ignore storage failures
        }
      };

      const runCleanup = async () => {
        if (!("serviceWorker" in navigator)) {
          return;
        }

        let registrations = [];
        try {
          registrations = await navigator.serviceWorker.getRegistrations();
        } catch {
          return;
        }

        if (!registrations.length) {
          return;
        }

        await Promise.allSettled(registrations.map((registration) => registration.unregister()));

        if ("caches" in window) {
          try {
            const cacheNames = await caches.keys();
            await Promise.allSettled(cacheNames.map((name) => caches.delete(name)));
          } catch {
            // ignore cache cleanup failures
          }
        }

        markReloaded();
        if (!alreadyReloaded) {
          window.location.reload();
        }
      };

      void runCleanup();
    })();
  </script>
