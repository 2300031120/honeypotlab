  <script>
    // Runtime cache cleanup is opt-in only.
    // Trigger with ?cleanup_runtime_caches=1 (or localStorage key with same name).
    (() => {
      if (typeof window === "undefined" || typeof navigator === "undefined") {
        return;
      }

      const flagName = "cleanup_runtime_caches";
      const params = new URLSearchParams(window.location.search || "");
      const shouldCleanup =
        params.get(flagName) === "1" ||
        (() => {
          try {
            return window.localStorage?.getItem(flagName) === "1";
          } catch {
            return false;
          }
        })();

      if (!shouldCleanup) {
        return;
      }

      const runCleanup = async () => {
        if ("serviceWorker" in navigator) {
          try {
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.allSettled(registrations.map((registration) => registration.unregister()));
          } catch {
            // Ignore service worker cleanup failures.
          }
        }

        if ("caches" in window) {
          try {
            const cacheNames = await caches.keys();
            await Promise.allSettled(cacheNames.map((name) => caches.delete(name)));
          } catch {
            // Ignore cache cleanup failures.
          }
        }

        try {
          window.localStorage?.removeItem(flagName);
        } catch {
          // Ignore storage failures.
        }
      };

      void runCleanup();
    })();
  </script>
