services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cybersentinel}
      - POSTGRES_USER=${POSTGRES_USER:-cybersentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}  # ⚠️ CRITICAL: MUST be set in .env file. Use strong password with min 16 chars, mixed case, numbers, symbols
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER:-replicator}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
    command:
      - postgres
      - -c max_wal_senders=10
      - -c wal_level=replica
      - -c hot_standby=on
      - -c wal_keep_size=100
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-cybersentinel} -d ${POSTGRES_DB:-cybersentinel}"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-tier

  postgres-replica:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cybersentinel}
      - POSTGRES_USER=${POSTGRES_USER:-cybersentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_MASTER_HOST=postgres
      - POSTGRES_MASTER_PORT=5432
      - POSTGRES_REPLICATION_USER=${POSTGRES_REPLICATION_USER:-replicator}
      - POSTGRES_REPLICATION_PASSWORD=${POSTGRES_REPLICATION_PASSWORD}
    command:
      - postgres
      - -c hot_standby=on
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - postgres_replica_data:/var/lib/postgresql/data
    networks:
      - data-tier

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data
    networks:
      - data-tier

  db-backup:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles:
      - backup
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-cybersentinel}
      - POSTGRES_USER=${POSTGRES_USER:-cybersentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ChangeThisLocalDbPassword_2026!}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - BACKUP_SCHEDULE=${BACKUP_SCHEDULE:-0 2 * * *}
      - BACKUP_RETENTION_DAYS=${BACKUP_RETENTION_DAYS:-7}
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - backup_data:/backups
    command: >
      /bin/sh -c "
      apk add --no-cache postgresql-client coreutils openssl &&
      while true; do
        echo 'Starting backup at $$(date)' &&
        BACKUP_FILE=/backups/backup-$$(date +%Y%m%d-%H%M%S).sql &&
        pg_dump -h postgres -U $$POSTGRES_USER $$POSTGRES_DB > $$BACKUP_FILE &&
        
        # Verify backup
        if [ -s $$BACKUP_FILE ]; then
          echo 'Backup verification successful'
          
          # Encrypt backup if key provided
          if [ -n \"$$BACKUP_ENCRYPTION_KEY\" ]; then
            openssl enc -aes-256-cbc -salt -in $$BACKUP_FILE -out $$BACKUP_FILE.enc -k \"$$BACKUP_ENCRYPTION_KEY\" &&
            rm $$BACKUP_FILE &&
            BACKUP_FILE=$$BACKUP_FILE.enc &&
            echo 'Backup encrypted'
          fi
          
          # Cleanup old backups
          find /backups -name 'backup-*.sql*' -mtime +$$BACKUP_RETENTION_DAYS -delete &&
          echo 'Old backups cleaned'
        else
          echo 'ERROR: Backup file is empty or missing'
        fi
        
        echo 'Backup completed successfully' &&
        sleep 86400
      done
      "

  terminal-sandbox:
    build: ./terminal-sandbox
    restart: unless-stopped
    expose:
      - "5100"
    environment:
      - SANDBOX_BASE_DIR=/sandbox-data
      - SANDBOX_EXEC_TIMEOUT_SEC=${TERMINAL_EXEC_TIMEOUT_SEC:-8}
      - SANDBOX_MAX_OUTPUT_CHARS=${TERMINAL_MAX_OUTPUT_CHARS:-12000}
      - SANDBOX_SESSION_TTL_SECONDS=${TERMINAL_SANDBOX_SESSION_TTL_SECONDS:-7200}
    volumes:
      - terminal_sandbox_data:/sandbox-data

  ssh-decoy:
    build: ./ssh-decoy
    restart: unless-stopped
    depends_on:
      - backend
      - terminal-sandbox
    ports:
      - "${SSH_DECOY_PORT:-2222}:2222"
    expose:
      - "5101"
    environment:
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:5000}
      - TERMINAL_SANDBOX_URL=${TERMINAL_SANDBOX_URL:-http://terminal-sandbox:5100}
      - PROTOCOL_SHARED_SECRET=${PROTOCOL_SHARED_SECRET:-dev-protocol-shared-secret-change-me}  # ⚠️ CRITICAL: MUST change in production! Use random 32+ char secret
      - PROTOCOL_SSH_AUTH_TRAP_ENABLED=${PROTOCOL_SSH_AUTH_TRAP_ENABLED:-true}
      - PROTOCOL_SSH_TRAP_CREDENTIALS=${PROTOCOL_SSH_TRAP_CREDENTIALS:-admin:Winter2026!,deploy:Deploy@2026!,reporting:Report#2026}  # ⚠️ CRITICAL: Change to realistic credentials in production
      - SSH_DECOY_LISTEN_HOST=0.0.0.0
      - SSH_DECOY_PORT=2222
      - SSH_DECOY_SITE_ID=${SSH_DECOY_SITE_ID:-}
      - SSH_DECOY_ACCEPT_ANY_PASSWORD=${SSH_DECOY_ACCEPT_ANY_PASSWORD:-false}
      - SSH_DECOY_SERVER_VERSION=${SSH_DECOY_SERVER_VERSION:-OpenSSH_8.9p1 Ubuntu-3ubuntu0.6}
      - SSH_DECOY_HTTP_TIMEOUT_SEC=${SSH_DECOY_HTTP_TIMEOUT_SEC:-4}
    volumes:
      - ssh_decoy_data:/data

  cowrie:
    image: cowrie/cowrie:latest
    profiles:
      - cowrie
    restart: unless-stopped
    ports:
      - "${COWRIE_SSH_PORT:-2223}:2222"
    environment:
      - COWRIE_TELNET_ENABLED=${COWRIE_TELNET_ENABLED:-no}
      - COWRIE_OUTPUT_JSONLOG_ENABLED=${COWRIE_OUTPUT_JSONLOG_ENABLED:-yes}
    volumes:
      - cowrie_var_data:/cowrie/cowrie-git/var

  cowrie-bridge:
    build: ./cowrie-bridge
    profiles:
      - cowrie
    restart: unless-stopped
    depends_on:
      - backend
      - cowrie
    environment:
      - BACKEND_INTERNAL_URL=${BACKEND_INTERNAL_URL:-http://backend:5000}
      - PROTOCOL_SHARED_SECRET=${PROTOCOL_SHARED_SECRET:-dev-protocol-shared-secret-change-me}  # ⚠️ CRITICAL: MUST change in production! Use random 32+ char secret
      - COWRIE_SITE_ID=${COWRIE_SITE_ID:-}
      - COWRIE_JSON_LOG=${COWRIE_JSON_LOG:-/cowrie/cowrie-git/var/log/cowrie/cowrie.json}
      - COWRIE_HTTP_TIMEOUT_SEC=${COWRIE_HTTP_TIMEOUT_SEC:-4}
      - COWRIE_BRIDGE_POLL_INTERVAL_SEC=${COWRIE_BRIDGE_POLL_INTERVAL_SEC:-2}
    volumes:
      - cowrie_var_data:/cowrie/cowrie-git/var:ro
      - cowrie_bridge_data:/data

  backend:
    build: ./backend
    restart: unless-stopped
    expose:
      - "5000"
    # SECURITY HARDENING - Network Segmentation
    networks:
      - app-tier
      - data-tier
    # SECURITY HARDENING - Resource Limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    # SECURITY HARDENING - Container Security
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
    user: "1000:1000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      terminal-sandbox:
        condition: service_started
    environment:
      - APP_ENV=${APP_ENV:-production}
      - DATABASE_URL=${DATABASE_URL}  # ⚠️ CRITICAL: MUST be set in .env file
      - POSTGRES_DB=${POSTGRES_DB:-cybersentinel}
      - POSTGRES_USER=${POSTGRES_USER:-cybersentinel}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}  # ⚠️ CRITICAL: MUST be set in .env file
      - REDIS_URL=redis://redis:6379/0
      - PUBLIC_BASE_URL=https://cybersentil.online
      - CORS_ORIGINS=${CORS_ORIGINS:-https://cybersentil.online,https://app.cybersentil.online}
      - TRUSTED_HOSTS=${TRUSTED_HOSTS:-cybersentil.online,app.cybersentil.online,localhost,127.0.0.1}
      - CLOUDFLARE_TUNNEL_ENABLED=${CLOUDFLARE_TUNNEL_ENABLED:-true}
      - ADMIN_WHITELIST_IPS=${ADMIN_WHITELIST_IPS:-}
      - RESPONSE_OBFUSCATION_ENABLED=${RESPONSE_OBFUSCATION_ENABLED:-true}
      - FORCE_HTTPS_REDIRECT=${FORCE_HTTPS_REDIRECT:-true}
      - SECURITY_HEADERS_ENABLED=${SECURITY_HEADERS_ENABLED:-true}
      - SECURITY_HSTS_SECONDS=${SECURITY_HSTS_SECONDS:-31536000}
      - SECURITY_CONTENT_SECURITY_POLICY=${SECURITY_CONTENT_SECURITY_POLICY:-}
      - DECOY_COOKIE_SECURE=${DECOY_COOKIE_SECURE:-true}
      - DECOY_COOKIE_SAMESITE=${DECOY_COOKIE_SAMESITE:-lax}
      - AUTH_RATE_LIMIT_WINDOW_SECONDS=${AUTH_RATE_LIMIT_WINDOW_SECONDS:-60}
      - AUTH_RATE_LIMIT_MAX_ATTEMPTS=${AUTH_RATE_LIMIT_MAX_ATTEMPTS:-8}
      - LEAD_RATE_LIMIT_WINDOW_SECONDS=${LEAD_RATE_LIMIT_WINDOW_SECONDS:-300}
      - LEAD_RATE_LIMIT_MAX_ATTEMPTS=${LEAD_RATE_LIMIT_MAX_ATTEMPTS:-5}
      - LEAD_NOTIFICATION_WEBHOOK_URL=${LEAD_NOTIFICATION_WEBHOOK_URL:-}
      - LEAD_NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS=${LEAD_NOTIFICATION_WEBHOOK_TIMEOUT_SECONDS:-5}
      - LEAD_NOTIFICATION_EMAIL_TO=${LEAD_NOTIFICATION_EMAIL_TO:-}
      - LEAD_NOTIFICATION_BRAND_NAME=${LEAD_NOTIFICATION_BRAND_NAME:-CyberSentil}
      - LEAD_NOTIFICATION_CONTACT_EMAIL=${LEAD_NOTIFICATION_CONTACT_EMAIL:-}
      - LEAD_AUTOREPLY_ENABLED=${LEAD_AUTOREPLY_ENABLED:-true}
      - LEAD_AUTOREPLY_REPLY_TO=${LEAD_AUTOREPLY_REPLY_TO:-}
      - LEAD_AUTOREPLY_DEMO_BOOKING_URL=${LEAD_AUTOREPLY_DEMO_BOOKING_URL:-}
      - SMTP_HOST=${SMTP_HOST:-smtp-relay.brevo.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-padigireddyhemachandrareddy@gmail.com}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-CyberSentinel}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_USE_SSL=${SMTP_USE_SSL:-false}
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=llama3
      - OLLAMA_REQUEST_TIMEOUT_SECONDS=${OLLAMA_REQUEST_TIMEOUT_SECONDS:-45}
      - AI_GENERATION_TIMEOUT_SECONDS=${AI_GENERATION_TIMEOUT_SECONDS:-25}
      - AI_BREAKER_FAILURE_THRESHOLD=${AI_BREAKER_FAILURE_THRESHOLD:-1}
      - AI_BREAKER_COOLDOWN_SECONDS=${AI_BREAKER_COOLDOWN_SECONDS:-60}
      - THREAT_ANALYSIS_AI_TIMEOUT_SECONDS=${THREAT_ANALYSIS_AI_TIMEOUT_SECONDS:-8}
      - SHELL_RESPONSE_AI_TIMEOUT_SECONDS=${SHELL_RESPONSE_AI_TIMEOUT_SECONDS:-8}
      - TERMINAL_REAL_EXEC_ENABLED=${TERMINAL_REAL_EXEC_ENABLED:-false}
      - TERMINAL_SANDBOX_URL=${TERMINAL_SANDBOX_URL:-http://terminal-sandbox:5100}
      - TERMINAL_EXEC_TIMEOUT_SEC=${TERMINAL_EXEC_TIMEOUT_SEC:-8}
      - TERMINAL_MAX_OUTPUT_CHARS=${TERMINAL_MAX_OUTPUT_CHARS:-12000}
      - PROTOCOL_SHARED_SECRET=${PROTOCOL_SHARED_SECRET}  # ⚠️ CRITICAL: MUST be set in .env file. Use random 32+ char secret
      - SSH_DECOY_HEALTH_URL=${SSH_DECOY_HEALTH_URL:-http://ssh-decoy:5101/health}
      - SECRET_KEY=${SECRET_KEY}  # ⚠️ CRITICAL: MUST be set in .env file. Use random 32+ char key
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID:-}
      - BOOTSTRAP_ADMIN_USERNAME=${BOOTSTRAP_ADMIN_USERNAME:-admin}
      - BOOTSTRAP_ADMIN_EMAIL=${BOOTSTRAP_ADMIN_EMAIL:-admin@cybersentil.local}
      - BOOTSTRAP_ADMIN_PASSWORD=${BOOTSTRAP_ADMIN_PASSWORD}  # ⚠️ CRITICAL: MUST be set in .env file. Use strong password with min 16 chars, mixed case, numbers, symbols
      - ENABLE_DEMO_SEED=${ENABLE_DEMO_SEED:-true}
      - ALLOW_SIGNUP=${ALLOW_SIGNUP:-false}
      - SPLUNK_HEC_URL=${SPLUNK_HEC_URL:-}
      - SPLUNK_HEC_TOKEN=${SPLUNK_HEC_TOKEN:-}
      - SPLUNK_HEC_VERIFY_TLS=${SPLUNK_HEC_VERIFY_TLS:-true}
      - SPLUNK_HEC_TIMEOUT_SECONDS=${SPLUNK_HEC_TIMEOUT_SECONDS:-4}
      - PROTOCOL_SSH_AUTH_TRAP_ENABLED=${PROTOCOL_SSH_AUTH_TRAP_ENABLED:-true}
      - PROTOCOL_SSH_TRAP_CREDENTIALS=${PROTOCOL_SSH_TRAP_CREDENTIALS:-}
      - PROTOCOL_MYSQL_AUTH_TRAP_ENABLED=${PROTOCOL_MYSQL_AUTH_TRAP_ENABLED:-true}
      - PROTOCOL_MYSQL_TRAP_CREDENTIALS=${PROTOCOL_MYSQL_TRAP_CREDENTIALS:-}
      - AI_LLM_ENABLED=${AI_LLM_ENABLED:-true}
      - AI_LLM_PROVIDER=${AI_LLM_PROVIDER:-openai}
      - AI_LLM_MODEL=${AI_LLM_MODEL:-gpt-4}
      - AI_LLM_API_KEY=${AI_LLM_API_KEY:-}
      - AI_LLM_MAX_TOKENS=${AI_LLM_MAX_TOKENS:-2000}
      - AI_LLM_TEMPERATURE=${AI_LLM_TEMPERATURE:-0.7}
      - QRADAR_HOST=${QRADAR_HOST:-}
      - QRADAR_PORT=${QRADAR_PORT:-443}
      - QRADAR_TOKEN=${QRADAR_TOKEN:-}
      - QRADAR_VERIFY_TLS=${QRADAR_VERIFY_TLS:-true}
      - QRADAR_TIMEOUT_SECONDS=${QRADAR_TIMEOUT_SECONDS:-5}
      - ELASTIC_HOST=${ELASTIC_HOST:-}
      - ELASTIC_PORT=${ELASTIC_PORT:-9200}
      - ELASTIC_USERNAME=${ELASTIC_USERNAME:-}
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD:-}
      - ELASTIC_API_KEY=${ELASTIC_API_KEY:-}
      - ELASTIC_INDEX=${ELASTIC_INDEX:-deception-events}
      - ELASTIC_VERIFY_TLS=${ELASTIC_VERIFY_TLS:-true}
      - ELASTIC_TIMEOUT_SECONDS=${ELASTIC_TIMEOUT_SECONDS:-5}
      - SENTINEL_WORKSPACE_ID=${SENTINEL_WORKSPACE_ID:-}
      - SENTINEL_SHARED_KEY=${SENTINEL_SHARED_KEY:-}
      - SENTINEL_LOG_TYPE=${SENTINEL_LOG_TYPE:-DeceptionEvents}
      - SENTINEL_TIMEOUT_SECONDS=${SENTINEL_TIMEOUT_SECONDS:-10}
    volumes:
      - backend_data:/data

  frontend:
    build:
      context: ./frontend
      args:
        VITE_PUBLIC_SITE_NAME: ${VITE_PUBLIC_SITE_NAME:-CyberSentil}
        VITE_PUBLIC_SHORT_NAME: ${VITE_PUBLIC_SHORT_NAME:-CyberSentil}
        VITE_PUBLIC_BRAND_TEXT: ${VITE_PUBLIC_BRAND_TEXT:-CYBERSENTIL}
        VITE_PUBLIC_TAGLINE: ${VITE_PUBLIC_TAGLINE:-Deception-led threat detection}
        VITE_PUBLIC_SITE_DESCRIPTION: ${VITE_PUBLIC_SITE_DESCRIPTION:-Deception-led threat detection platform for earlier attacker visibility, preserved evidence, and AI-assisted incident context.}
        VITE_PUBLIC_SITE_URL: ${VITE_PUBLIC_SITE_URL:-http://localhost}
        VITE_PUBLIC_APP_URL: ${VITE_PUBLIC_APP_URL:-http://localhost}
        VITE_PUBLIC_LOGIN_URL: ${VITE_PUBLIC_LOGIN_URL:-}
        VITE_PUBLIC_COMPANY_NAME: ${VITE_PUBLIC_COMPANY_NAME:-CyberSentil}
        VITE_PUBLIC_CONTACT_EMAIL: ${VITE_PUBLIC_CONTACT_EMAIL:-contact@cybersentil.online}
        VITE_PUBLIC_SECURITY_EMAIL: ${VITE_PUBLIC_SECURITY_EMAIL:-security@cybersentil.online}
        VITE_PUBLIC_PRIVACY_EMAIL: ${VITE_PUBLIC_PRIVACY_EMAIL:-privacy@cybersentil.online}
        VITE_PUBLIC_DEMO_BOOKING_URL: ${VITE_PUBLIC_DEMO_BOOKING_URL:-}
        VITE_PUBLIC_DEMO_BOOKING_LABEL: ${VITE_PUBLIC_DEMO_BOOKING_LABEL:-Book Live Slot}
        VITE_PUBLIC_SHOW_STATUS_PILL: ${VITE_PUBLIC_SHOW_STATUS_PILL:-false}
        VITE_GOOGLE_CLIENT_ID: ${VITE_GOOGLE_CLIENT_ID:-}
    # SECURITY HARDENING - Network Segmentation
    networks:
      - dmz-tier
      - app-tier
    # SECURITY HARDENING - Resource Limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    # SECURITY HARDENING - Container Security
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=5m
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - certbot_www:/var/www/certbot:ro
    depends_on:
      - backend

  tls-gateway:
    image: nginx:alpine
    profiles:
      - tls
    depends_on:
      - frontend
    ports:
      - "443:443"
    environment:
      - TLS_DOMAIN=${TLS_DOMAIN:-localhost}
    volumes:
      - ./deploy/nginx/https-gateway.conf.template:/etc/nginx/templates/default.conf.template:ro
      - ./deploy/nginx/generated:/etc/nginx/cybersentinel:ro
      - certbot_conf:/etc/letsencrypt:ro
    command: >
      /bin/sh -c "envsubst '$$TLS_DOMAIN' < /etc/nginx/templates/default.conf.template > /etc/nginx/conf.d/default.conf
      && nginx -g 'daemon off;'"

  certbot:
    image: certbot/certbot:latest
    profiles:
      - tls
    volumes:
      - certbot_conf:/etc/letsencrypt
      - certbot_www:/var/www/certbot

  cloudflared:
    image: cloudflare/cloudflared:latest
    profiles:
      - cloudflare
    restart: unless-stopped
    depends_on:
      - frontend
    networks:
      - dmz-tier
    command: tunnel --no-autoupdate run --protocol http2 --token ${CLOUDFLARE_TUNNEL_TOKEN:-}

  cloudflared-quick:
    image: cloudflare/cloudflared:latest
    profiles:
      - quick-tunnel
    restart: unless-stopped
    depends_on:
      - frontend
    command: tunnel --no-autoupdate --url http://frontend:80

# SECURITY HARDENING - Network Segmentation
networks:
  dmz-tier:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.1.0/24
  app-tier:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.2.0/24
  data-tier:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.28.3.0/24
  honeypot-tier:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.28.4.0/24

volumes:
  postgres_data:
  postgres_replica_data:
  redis_data:
  backend_data:
  terminal_sandbox_data:
  ssh_decoy_data:
  cowrie_var_data:
  cowrie_bridge_data:
  certbot_www:
  certbot_conf:
  backup_data:
