# HAProxy Configuration for CyberSentil
# Load balancer for backend services

global
    log stdout format raw local0
    stats enable
    stats uri /haproxy-stats
    stats refresh 30s
    stats show-legends
    stats auth admin:HAProxyAdm!n2026

defaults
    log global
    mode http
    option httplog
    option dontlognull
    timeout connect 5000ms
    timeout client 50000ms
    timeout server 50000ms
    errorfile 400 /etc/haproxy/errors/400.http
    errorfile 503 /etc/haproxy/errors/503.http

# Frontend - accepts incoming connections
frontend backend_frontend
    bind *:8000
    default_backend backend_servers
    option http-buffer-request
    option http-buffer-response

# Backend - backend servers
backend backend_servers
    balance roundrobin
    option httpchk GET /health
    http-check expect status 200
    server backend1 backend:5000 check inter 5000 rise 2 fall 3
    # Add more backend instances here for horizontal scaling
    # server backend2 backend2:5000 check inter 5000 rise 2 fall 3

# Health check endpoint
frontend health_frontend
    bind *:8404
    default_backend health_backend

backend health_backend
    mode http
    server health localhost:5000 check inter 2000 rise 1 fall 1
