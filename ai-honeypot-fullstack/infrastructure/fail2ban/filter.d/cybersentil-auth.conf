# Fail2Ban Filter for CyberSentil Authentication Failures
# Place in: /etc/fail2ban/filter.d/cybersentil-auth.conf

[Definition]

# Pattern to match failed login attempts
failregex = ^.*SECURITY_EVENT: failed_login .* IP: <HOST>.*
            ^.*Failed login attempt.*from <HOST>.*
            ^.*Invalid credentials.*client <HOST>.*
            ^.*Authentication failed.*IP: <HOST>.*

# Pattern to ignore (successful logins)
ignoreregex = ^.*Successful login.*from <HOST>.*
              ^.*Login successful.*<HOST>.*

# Date pattern
datepattern = %%Y-%%m-%%d[T ]%%H:%%M:%%S(?:\.%%f)?(?: %%z)?

[Init]

# Default date format
datepattern = {^LN-BEG}%%ExY(?P<_sep>[-/.])%%m(?P=_sep)%%d[T ]%%H:%%M:%%S(?:[.,]%%f)?(?:\s*%%z)?
              ^[^\[]*\[({DATE})
              {^LN-BEG}{DATE}
              {DEFAULT}

# Journal format
journalmatch = _SYSTEMD_UNIT=cybersentil.service
