# Fail2Ban Filter for CyberSentil SQL Injection Attempts
# Place in: /etc/fail2ban/filter.d/cybersentil-sqli.conf

[Definition]

# Pattern to match SQL injection attempts
failregex = ^.*SECURITY_EVENT: sql_injection_attempt .* IP: <HOST>.*
            ^.*SQL injection.*detected.*from <HOST>.*
            ^.*DROP\s+TABLE.*<HOST>.*
            ^.*UNION\s+SELECT.*<HOST>.*
            ^.*SLEEP\s*\(.*<HOST>.*
            ^.*BENCHMARK\s*\(.*<HOST>.*
            ^.*INTO\s+OUTFILE.*<HOST>.*
            ^.*LOAD_FILE\s*\(.*<HOST>.*
            ^.*WAITFOR\s+DELAY.*<HOST>.*
            ^.*sql_injection_attempt.*ip.*<HOST>.*
            ^.*SQL.*validation.*failed.*source_ip.*<HOST>.*

# Nothing to ignore for SQL injection
ignoreregex = 

[Init]

datepattern = {DEFAULT}

# High priority for SQL injection attempts
# Ban immediately on first detection
maxretry = 1
bantime = 86400
