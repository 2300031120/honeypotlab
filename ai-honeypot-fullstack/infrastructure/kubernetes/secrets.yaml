apiVersion: v1
kind: Secret
metadata:
  name: cybersentil-secrets
type: Opaque
stringData:
  # Database credentials
  database-url: "postgresql://cybersentinel:CHANGE_ME@postgres:5432/cybersentinel"
  postgres-db: "cybersentinel"
  postgres-user: "cybersentinel"
  postgres-password: "CHANGE_ME"
  
  # Redis credentials
  redis-url: "redis://redis:6379/0"
  
  # Application secrets
  secret-key: "CHANGE_ME"
  
  # Protocol secrets
  protocol-shared-secret: "CHANGE_ME"
  
  # SMTP credentials
  smtp-password: "CHANGE_ME"
  
  # Cloudflare tunnel token
  cloudflare-tunnel-token: "CHANGE_ME"
