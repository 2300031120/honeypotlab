name: Backend Sanity

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-sanity.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-sanity.yml"
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dev dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Compile critical backend modules
        run: |
          python -m py_compile backend/main.py
          python -m py_compile backend/dependencies.py
          python -m py_compile backend/core/config.py
          python -m py_compile backend/core/database.py
          python -m py_compile backend/core/security.py
          python -m py_compile backend/core/time_utils.py
          python -m py_compile backend/routers/auth.py
          python -m py_compile backend/routers/sites.py
          python -m py_compile backend/routers/telemetry.py
          python -m py_compile backend/routers/leads.py
          python -m py_compile backend/schemas.py

      - name: Run API contract smoke tests
        run: python -m pytest backend/tests/test_api_contract_smoke.py -q

      - name: Run backend pytest suite
        run: python -m pytest backend/tests -q
