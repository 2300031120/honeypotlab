name: Frontend Sanity

on:
  push:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-sanity.yml"
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-sanity.yml"
  workflow_dispatch:

jobs:
  sanity:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run tests
        run: npm run test:ci

      - name: Build production bundle
        run: npm run build
