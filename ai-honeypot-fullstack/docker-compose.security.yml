# Docker Compose Security Extensions
# Apply with: docker-compose -f docker-compose.yml -f docker-compose.security.yml up -d

version: '3.8'

services:
  # Security-enhanced Frontend
  frontend:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m
      - /var/cache/nginx:noexec,nosuid,size=50m
      - /var/run:noexec,nosuid,size=10m
    user: "1000:1000"
    networks:
      - dmz
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.25'
          memory: 128M

  # Security-enhanced Backend
  backend:
    security_opt:
      - no-new-privileges:true
      - seccomp:./infrastructure/seccomp/backend-profile.json
      - apparmor:docker-backend
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=500m,uid=1000,gid=1000
    user: "1000:1000"
    networks:
      - internal
      - database
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # Security-enhanced PostgreSQL
  postgres:
    security_opt:
      - no-new-privileges:true
      - seccomp:./infrastructure/seccomp/postgres-profile.json
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=100m,uid=999,gid=999
      - /var/run/postgresql:noexec,nosuid,size=10m,uid=999,gid=999
    user: "999:999"
    networks:
      - database
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Security-enhanced SSH Decoy
  ssh-decoy:
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
      - SETGID
      - SETUID
    user: "1000:1000"
    networks:
      - honeypot
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # Security-enhanced Terminal Sandbox
  terminal-sandbox:
    security_opt:
      - no-new-privileges:true
      - seccomp:./infrastructure/seccomp/sandbox-profile.json
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
      - /sandbox:noexec,nosuid,size=100m
    user: "1000:1000"
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # NEW: Redis for secure session storage
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-changeme}
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETGID
      - SETUID
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=50m
    volumes:
      - redis_data:/data
    user: "999:999"
    networks:
      - database
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # NEW: Fail2Ban for intrusion prevention
  fail2ban:
    image: crazymax/fail2ban:latest
    restart: unless-stopped
    volumes:
      - ./infrastructure/fail2ban:/etc/fail2ban:ro
      - /var/log/nginx:/var/log/nginx:ro
      - fail2ban_data:/data
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - TZ=UTC
      - F2B_LOG_LEVEL=INFO
      - F2B_DB_FILE=/data/fail2ban.sqlite3
    depends_on:
      - frontend

  # NEW: Log aggregation with Fluentd
  fluentd:
    image: fluent/fluentd:v1.16-debian
    restart: unless-stopped
    volumes:
      - ./infrastructure/fluentd/fluent.conf:/fluentd/etc/fluent.conf:ro
      - /var/log:/var/log/host:ro
      - fluentd_data:/fluentd/data
    networks:
      - internal
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 128M

  # NEW: WireGuard VPN for admin access
  wireguard:
    image: linuxserver/wireguard:latest
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=UTC
      - SERVERURL=cybersentil.online
      - SERVERPORT=51820
      - PEERS=admin1,admin2,support
      - PEERDNS=1.1.1.1,1.0.0.1
      - INTERNAL_SUBNET=10.100.0.0/24
    volumes:
      - wireguard_config:/config
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.conf.all.src_valid_mark=1
    networks:
      - management

networks:
  dmz:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.1.0/24
  
  internal:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.2.0/24
  
  database:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.20.3.0/24
  
  honeypot:
    driver: bridge
    internal: false
    ipam:
      config:
        - subnet: 172.20.4.0/24
  
  management:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 10.100.0.0/24

volumes:
  redis_data:
  fail2ban_data:
  fluentd_data:
  wireguard_config:
